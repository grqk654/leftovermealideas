<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leftover Meal Ideas — Free Recipes for Whatever's in Your Fridge</title>
    <meta name="description" content="Find quick, easy meal ideas using whatever leftovers you have. Free recipes for leftover rice, chicken, and more. No sign-up required." />
    <meta name="keywords" content="leftover meal ideas, what to do with leftover rice, leftover chicken recipes, easy leftover recipes" />
    <link rel="canonical" href="https://www.leftovermealideas.com" />

    <!-- Open Graph -->
    <meta property="og:title" content="Leftover Meal Ideas — Turn Any Leftover Into a Real Meal" />
    <meta property="og:description" content="Free recipes for whatever's in your fridge. Leftover rice, chicken, and more — no wasted food." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.leftovermealideas.com" />

    <!-- Schema.org -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "LeftoverMealIdeas",
      "url": "https://www.leftovermealideas.com",
      "description": "Free recipes for leftover ingredients — rice, chicken, and more.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.leftovermealideas.com/recipes?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Google Fonts: Outfit + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; }
      body {
        font-family: 'DM Sans', sans-serif;
        background: #ffffff;
        color: #1a2e0d;
        -webkit-font-smoothing: antialiased;
      }
      a { text-decoration: none; color: inherit; }
      button { cursor: pointer; font-family: inherit; }
      input { font-family: inherit; }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
